<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE NEW ACCOUNT</title>
</head>
<body>
    
    <a href="/">Home</a>
    <a href="/loginpage">Login</a>
    <a href="/createnewaccpage">Create Account</a>
    <center>
        <h1>CREATE NEW ACCOUNT</h1>
    <table>
        <tr>
            <td><label>FIRST NAME</label></td>
            <td><input type="text" name="firstname" id="firstname" required></td>
        </tr>
        <tr>
                        <td><label>LAST NAME</label></td>
            <td><input type="text" name="lastname" id="lastname" required></td>
        </tr>
                <tr>
                        <td><label>EMAIL</label></td>
            <td><input type="email" name="email" id="email" required></td>
        </tr>
                <tr>
                        <td><label>PHONE NO</label></td>
            <td><input type="number" name="phno" id="phno" required></td>
        </tr>
                <tr>
                        <td><label>GENDER</label></td>
            <td><select name="gender">
                <option value="MALE">MALE</option>
                <option value="FEMALE">FEMALE</option>
                </select>
            </td>
        </tr>
                <tr>
                        <td><label>DOB</label></td>
            <td><input type="date" name="dob" id="dob" required></td>
        </tr>
                        <tr>
                        <td><label>ACCOUNT PIN</label></td>
            <td><input type="password" name="accpin" id="accpin" required></td>
        </tr>
                        <tr>
                        <td><label>AMOUNT</label></td>
            <td><input type="number" name="amount" id="amount" required></td>
        </tr>
                        <tr>
                        <td><label>ADDRESS</label></td>
                        <td><textarea rows="5" cols="21" name="address" id="address"></textarea></td>
        </tr>
                        <tr>
                            <td></td>
                        <td><input type="submit" value="Create account"></td>
        </td>
        </tr>

    </table>
    </center>
</body>
</html>
